<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>

    <script>


        alert(" Welcome to JS \n Lets add 2 numbers");

        // \n new line in js 

        let num1 = prompt("Enter first number");
        let num2 = prompt("Enter second number");

        // change string to Number 
        num1 = Number(num1);
        num2 = Number(num2);


        alert(num1 + num2);



    </script>
</head>

<body>

    <h1>
        Simple Calculator


    </h1>
</body>

</html>
